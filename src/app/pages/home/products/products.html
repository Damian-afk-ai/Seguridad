<h2>Productos</h2>
<p class="subtitle">Catálogo de productos y servicios</p>

<p-card>
    <p-table [value]="products" [stripedRows]="true" [tableStyle]="{ 'min-width': '50rem' }">
        <ng-template #header>
            <tr>
                <th>ID</th>
                <th>Nombre</th>
                <th>Categoría</th>
                <th>Estado</th>
                <th>Precio</th>
            </tr>
        </ng-template>
        <ng-template #body let-product>
            <tr>
                <td>{{ product.id }}</td>
                <td><strong>{{ product.name }}</strong></td>
                <td>
                    <p-tag [value]="product.category" severity="info" />
                </td>
                <td>
                    <p-tag [value]="product.status" [severity]="getSeverity(product.status)" />
                </td>
                <td><strong>{{ product.price }}</strong></td>
            </tr>
        </ng-template>
    </p-table>
</p-card>
