<p-toast />
<p-confirmDialog />

<p-card header="Perfil de Usuario">
    <div class="profile-header">
        <p-avatar icon="pi pi-user" size="xlarge" shape="circle" />
        <div class="profile-info">
            <h3>{{ admin.nombre }}</h3>
            <div class="profile-tags">
                <p-tag [value]="admin.rol" severity="info" icon="pi pi-shield" />
                <p-tag *ngIf="dadoDeBaja" value="Dado de baja" severity="danger" icon="pi pi-ban" />
                <p-tag *ngIf="!dadoDeBaja" value="Activo" severity="success" icon="pi pi-check" />
            </div>
        </div>
    </div>

    <p-divider />

    <!-- Nombre -->
    <div class="field">
        <p-floatlabel [variant]="isEditing ? 'on' : 'in'">
            <input pInputText id="nombre" [(ngModel)]="admin.nombre" [disabled]="!isEditing || dadoDeBaja" />
            <label for="nombre">Nombre</label>
        </p-floatlabel>
    </div>

    <!-- Email -->
    <div class="field">
        <p-floatlabel [variant]="isEditing ? 'on' : 'in'">
            <input pInputText id="email" [(ngModel)]="admin.email" [disabled]="!isEditing || dadoDeBaja" />
            <label for="email">Correo Electrónico</label>
        </p-floatlabel>
    </div>

    <!-- Contraseña -->
    <div class="field">
        <p-floatlabel [variant]="isEditing ? 'on' : 'in'">
            <p-password id="password" [(ngModel)]="admin.password" [feedback]="false" [toggleMask]="true"
                [disabled]="!isEditing || dadoDeBaja" />
            <label for="password">Contraseña</label>
        </p-floatlabel>
    </div>

    <!-- Teléfono -->
    <div class="field">
        <p-floatlabel [variant]="isEditing ? 'on' : 'in'">
            <input pInputText id="telefono" [(ngModel)]="admin.telefono" [disabled]="!isEditing || dadoDeBaja" />
            <label for="telefono">Teléfono</label>
        </p-floatlabel>
    </div>

    <p-divider />

    <!-- Botones -->
    <div class="actions">
        <!-- Editar Perfil: requiere users_edit -->
        <ng-container *ifHasPermission="['users_edit']">
            <p-button *ngIf="!isEditing && !dadoDeBaja" label="Editar Perfil" icon="pi pi-pencil"
                (onClick)="toggleEdit()" />
        </ng-container>

        <p-button *ngIf="isEditing" label="Guardar" icon="pi pi-check" (onClick)="saveChanges()" />
        <p-button *ngIf="isEditing" label="Cancelar" icon="pi pi-times" severity="secondary" (onClick)="cancelEdit()" />

        <div class="spacer"></div>

        <!-- Dar de baja: requiere users_delete -->
        <ng-container *ifHasPermission="['users_delete']">
            <p-button *ngIf="!dadoDeBaja" label="Dar de baja" icon="pi pi-ban" severity="danger" [outlined]="true"
                (onClick)="darDeBaja()" [disabled]="isEditing" />
        </ng-container>

        <ng-container *ifHasPermission="['users_delete']">
            <p-button *ngIf="dadoDeBaja" label="Reactivar cuenta" icon="pi pi-refresh" severity="success"
                [outlined]="true" (onClick)="darDeBaja()" />
        </ng-container>
    </div>
</p-card>
