<div class="login-container">
    <p-card header="Login">
        <form (ngSubmit)="login()">
            <div class="form-group">
                <p-floatlabel>
                    <input pInputText id="email" [(ngModel)]="email" name="email" />
                    <label for="email">Email</label>
                </p-floatlabel>
            </div>
            <div class="form-group">
                <p-floatlabel>
                    <p-password id="password" [(ngModel)]="password" name="password" [feedback]="false"
                        [toggleMask]="true" />
                    <label for="password">Password</label>
                </p-floatlabel>
            </div>
            <p-button type="submit" label="Iniciar Sesión" />
        </form>
    </p-card>
</div>
