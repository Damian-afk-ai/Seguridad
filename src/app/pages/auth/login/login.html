<p-toast />
<div class="login-container">
    <p-card header="Iniciar Sesión">
        <form (ngSubmit)="login()">
            <div class="form-group">
                <p-floatlabel variant="on">
                    <input pInputText id="email" [(ngModel)]="email" name="email" />
                    <label for="email">Email</label>
                </p-floatlabel>
            </div>
            <div class="form-group">
                <p-floatlabel variant="on">
                    <p-password id="password" [(ngModel)]="password" name="password" [feedback]="false"
                        [toggleMask]="true" />
                    <label for="password">Contraseña</label>
                </p-floatlabel>
            </div>
            <p-button type="submit" label="Iniciar Sesión" icon="pi pi-sign-in" />
            <div class="credentials-hint">
                <i class="pi pi-info-circle"></i>
                <small>Credenciales: admin&#64;correo.com / Seguridad1!</small>
            </div>
        </form>
    </p-card>
</div>
