<div class="register-container">
    <p-card header="Registro">
        <form (ngSubmit)="register()">
            <div class="form-group">
                <p-floatlabel>
                    <input pInputText id="nombre" [(ngModel)]="nombre" name="nombre" />
                    <label for="nombre">Nombre</label>
                </p-floatlabel>
            </div>
            <div class="form-group">
                <p-floatlabel>
                    <input pInputText id="email" [(ngModel)]="email" name="email" />
                    <label for="email">Email</label>
                </p-floatlabel>
            </div>
            <div class="form-group">
                <p-floatlabel>
                    <p-password id="password" [(ngModel)]="password" name="password" [feedback]="false"
                        [toggleMask]="true" />
                    <label for="password">Password</label>
                </p-floatlabel>
            </div>
            <p-button type="submit" label="Registrarse" />
        </form>
    </p-card>
</div>
